<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SERPENTINE — 8-BIT EDITION</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
  /* ─────────── PALETTE (NES-flavored arcade) ─────────── */
  :root {
    --c-void:       #07071a;
    --c-night:      #0f0d2b;
    --c-deepblue:   #1a1949;
    --c-cabinet-a:  #2a1a4a;
    --c-cabinet-b:  #15102a;
    --c-bezel-a:    #3a2a5a;
    --c-bezel-b:    #1a1238;
    --c-rivet:      #5a4a8a;
    --c-rivet-hi:   #c8c0ff;
    --c-screen:     #050218;
    --c-scanline:   rgba(0, 0, 0, 0.35);
    --c-phosphor:   #92ec3a;
    --c-yellow:     #ffd23a;
    --c-yellow-hi:  #fff5a0;
    --c-orange:     #ff7a1f;
    --c-red:        #e83a3a;
    --c-pink:       #ff5cd0;
    --c-cyan:       #3afaff;
    --c-cyan-dim:   #3aa0c8;
    --c-cream:      #fffce0;
    --c-mute:       #6a6a90;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; }

  body {
    font-family: 'VT323', ui-monospace, monospace;
    color: var(--c-cream);
    background-color: var(--c-void);
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.6) 0 1px, transparent 1.5px),
      radial-gradient(circle at 70% 35%, rgba(255, 255, 255, 0.5) 0 1px, transparent 1.5px),
      radial-gradient(circle at 40% 70%, rgba(255, 255, 255, 0.5) 0 1px, transparent 1.5px),
      radial-gradient(circle at 85% 85%, rgba(255, 255, 255, 0.4) 0 1px, transparent 1.5px),
      radial-gradient(circle at 55% 92%, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px),
      radial-gradient(circle at 12% 60%, rgba(255, 255, 255, 0.4) 0 1px, transparent 1.5px),
      radial-gradient(circle at 92% 50%, rgba(255, 255, 255, 0.45) 0 1px, transparent 1.5px),
      radial-gradient(circle at 32% 40%, rgba(255, 255, 255, 0.35) 0 1px, transparent 1.5px),
      linear-gradient(180deg, #0a0826 0%, #07071a 100%);
    background-size: 320px 320px, 280px 280px, 360px 360px, 240px 240px, 300px 300px, 280px 280px, 340px 340px, 260px 260px, auto;
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 16px;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  /* ─────────── CABINET ─────────── */
  .cabinet {
    position: relative;
    width: min(620px, 100%);
    background:
      linear-gradient(180deg, var(--c-cabinet-a) 0%, var(--c-cabinet-b) 100%);
    padding: 28px 28px 24px;
    /* chunky pixel-art border with stepped corners */
    border: 4px solid #000;
    box-shadow:
      0 0 0 4px var(--c-rivet),
      0 0 0 8px #000,
      0 18px 0 0 rgba(0,0,0,0.55),
      0 24px 60px rgba(0, 0, 0, 0.7),
      inset 0 4px 0 rgba(255, 255, 255, 0.06),
      inset 0 -4px 0 rgba(0, 0, 0, 0.45);
  }

  /* corner rivets */
  .rivet {
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--c-rivet);
    border: 2px solid #000;
    box-shadow:
      inset 2px 2px 0 var(--c-rivet-hi),
      inset -2px -2px 0 #1a1340;
  }
  .rivet.tl { top: 6px;    left: 6px; }
  .rivet.tr { top: 6px;    right: 6px; }
  .rivet.bl { bottom: 6px; left: 6px; }
  .rivet.br { bottom: 6px; right: 6px; }

  /* power LED */
  .power {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #8a8aff;
    letter-spacing: 0.1em;
    z-index: 2;
  }
  .power-led {
    width: 8px; height: 8px;
    background: #ff3232;
    border: 1px solid #000;
    box-shadow: 0 0 8px #ff3232;
    animation: power-flicker 3s ease-in-out infinite;
  }
  @keyframes power-flicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.65; }
  }

  /* ─────────── MARQUEE ─────────── */
  .marquee {
    margin: 14px 0 18px;
    padding: 16px 12px;
    text-align: center;
    background: #000;
    border: 4px solid var(--c-rivet);
    box-shadow:
      inset 0 0 0 2px #000,
      inset 0 0 28px rgba(255, 210, 58, 0.12);
    position: relative;
  }
  /* corner notches on marquee */
  .marquee::before, .marquee::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    background: var(--c-cabinet-a);
    border: 2px solid #000;
  }
  .marquee::before { top: -6px; left: -6px; }
  .marquee::after  { top: -6px; right: -6px; }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(22px, 5.2vw, 36px);
    line-height: 1;
    letter-spacing: 0.05em;
    color: var(--c-yellow);
    text-shadow:
      3px 3px 0 var(--c-red),
      6px 6px 0 var(--c-pink),
      0 0 22px rgba(255, 210, 58, 0.55);
    animation: logo-shimmer 4s ease-in-out infinite;
  }
  @keyframes logo-shimmer {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.2) saturate(1.15); }
  }
  .logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
  }
  .logo-row .star {
    color: var(--c-cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 18px);
    text-shadow: 2px 2px 0 var(--c-deepblue);
    animation: star-spin 1.6s steps(4) infinite;
  }
  @keyframes star-spin {
    0%   { transform: rotate(0deg);   }
    100% { transform: rotate(360deg); }
  }

  .subtitle {
    margin-top: 12px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.4em;
    color: var(--c-cyan);
    text-shadow: 1px 1px 0 #000;
    padding-left: 0.4em;
  }

  /* ─────────── SCORE PANEL ─────────── */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
    padding: 8px 14px;
    font-family: 'Press Start 2P', monospace;
    background: #000;
    border: 2px solid var(--c-rivet);
  }
  .score-block { display: flex; flex-direction: column; gap: 6px; }
  .score-block.left  { align-items: flex-start; }
  .score-block.right { align-items: flex-end; }

  .score-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    padding-left: 0.15em;
  }
  .label-1up { color: var(--c-red); }
  .label-hi  { color: var(--c-cyan); }
  .label-mid { color: var(--c-yellow); }

  .score-value {
    font-size: 16px;
    color: var(--c-cream);
    text-shadow: 2px 2px 0 #000;
    font-variant-numeric: tabular-nums;
    transition: transform 100ms steps(2), color 100ms;
  }
  .score-value.bump { transform: scale(1.18); color: var(--c-yellow-hi); }

  .scoreboard .center { text-align: center; }
  .scoreboard .center .crest {
    color: var(--c-yellow);
    font-size: 14px;
    text-shadow: 2px 2px 0 var(--c-orange);
    animation: crest-bob 1.2s steps(2) infinite;
  }
  @keyframes crest-bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  /* ─────────── CRT SCREEN ─────────── */
  .crt {
    position: relative;
    padding: 14px;
    background:
      radial-gradient(ellipse at center, var(--c-bezel-a) 0%, var(--c-bezel-b) 100%);
    border: 4px solid #000;
    box-shadow:
      inset 0 0 0 2px var(--c-rivet),
      inset 0 0 0 4px #000,
      0 0 0 4px var(--c-rivet),
      0 8px 0 0 rgba(0,0,0,0.5);
  }
  .crt-screen {
    position: relative;
    background: var(--c-screen);
    border: 4px solid #000;
    overflow: hidden;
    box-shadow:
      inset 0 0 30px rgba(146, 236, 58, 0.07),
      inset 0 0 6px rgba(0, 0, 0, 0.9),
      inset 0 0 0 1px rgba(146, 236, 58, 0.1);
  }
  /* scanlines */
  .crt-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg,
        rgba(0,0,0,0.45) 0px,
        rgba(0,0,0,0.45) 1px,
        transparent       1px,
        transparent       3px);
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: multiply;
  }
  /* curvature/vignette */
  .crt-screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(255,255,255,0.04), transparent 12%);
    pointer-events: none;
    z-index: 4;
  }

  #game {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ─────────── OVERLAY ─────────── */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.55) 0 1px, transparent 1px 3px),
      rgba(5, 2, 24, 0.78);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms steps(4);
  }
  .overlay.visible { opacity: 1; pointer-events: auto; }

  .overlay-eyebrow {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    color: var(--c-cyan);
    margin-bottom: 12px;
    text-shadow: 1px 1px 0 #000;
    padding-left: 0.35em;
  }
  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(20px, 4.6vw, 28px);
    color: var(--c-yellow);
    text-shadow:
      2px 2px 0 var(--c-red),
      4px 4px 0 #000;
    margin-bottom: 14px;
    line-height: 1.2;
  }
  .overlay-text {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--c-cream);
    margin-bottom: 22px;
    max-width: 30ch;
    line-height: 1.2;
  }
  .overlay-hint {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: var(--c-yellow);
    text-transform: uppercase;
    text-shadow: 1px 1px 0 var(--c-red);
    padding-left: 0.32em;
    animation: blink 0.9s steps(2) infinite;
  }
  @keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0.15; }
  }

  /* ─────────── CONTROL BAR ─────────── */
  .controls {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--c-cream);
    padding: 0 6px;
  }
  .controls span { display: inline-flex; align-items: center; gap: 6px; }
  .controls kbd {
    display: inline-block;
    padding: 4px 6px;
    background: #000;
    color: var(--c-yellow);
    border: 2px solid var(--c-rivet);
    box-shadow: 2px 2px 0 #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    min-width: 16px;
    text-align: center;
  }
  .controls kbd.wide { padding: 4px 8px; }

  .sound-toggle {
    background: #000;
    color: var(--c-cyan);
    border: 2px solid var(--c-rivet);
    box-shadow: 2px 2px 0 #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    letter-spacing: 0.15em;
    padding: 4px 8px;
    cursor: pointer;
    transition: transform 80ms steps(2);
  }
  .sound-toggle:hover { transform: translate(-1px, -1px); }
  .sound-toggle:active { transform: translate(1px, 1px); box-shadow: none; }
  .sound-toggle.off { color: var(--c-mute); }

  /* ─────────── FOOTER ─────────── */
  .footer {
    margin-top: 14px;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    letter-spacing: 0.4em;
    color: var(--c-rivet);
    padding-left: 0.4em;
  }

  @media (max-width: 540px) {
    .cabinet { padding: 22px 14px 16px; }
    .marquee { padding: 12px 8px; }
    .logo-row { gap: 8px; }
    .controls { gap: 10px; }
  }
</style>
</head>
<body>
  <main class="cabinet">
    <span class="rivet tl"></span><span class="rivet tr"></span>
    <span class="rivet bl"></span><span class="rivet br"></span>

    <div class="power" aria-hidden="true">
      <span class="power-led"></span><span>POWER</span>
    </div>

    <div class="marquee">
      <div class="logo-row">
        <span class="star">★</span>
        <span class="logo">SERPENTINE</span>
        <span class="star">★</span>
      </div>
      <div class="subtitle">BONDS&nbsp;&nbsp;RANCH&nbsp;&nbsp;PRIEST&nbsp;&nbsp;QUORUM</div>
    </div>

    <div class="scoreboard" aria-label="Scoreboard">
      <div class="score-block left">
        <div class="score-label label-1up">1UP</div>
        <div class="score-value" id="score">0000</div>
      </div>
      <div class="center">
        <div class="score-label label-mid">LV</div>
        <div class="score-value crest" id="level">01</div>
      </div>
      <div class="score-block right">
        <div class="score-label label-hi">HI-SCORE</div>
        <div class="score-value" id="best">0000</div>
      </div>
    </div>

    <div class="crt">
      <div class="crt-screen">
        <canvas id="game" width="320" height="320" aria-label="Game board"></canvas>
        <div class="overlay visible" id="overlay" role="dialog" aria-live="polite">
          <div class="overlay-eyebrow" id="overlayEyebrow">A R C A D E</div>
          <div class="overlay-title" id="overlayTitle">SERPENTINE</div>
          <div class="overlay-text" id="overlayText">EAT THE CHERRIES.<br/>DODGE YOUR TAIL.<br/>BEAT THE HI-SCORE.</div>
          <div class="overlay-hint" id="overlayHint">► PRESS ANY ARROW</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <span><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>&nbsp;MOVE</span>
      <span><kbd class="wide">SPC</kbd>&nbsp;PAUSE</span>
      <span><kbd>R</kbd>&nbsp;RESTART</span>
      <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false">♪ SND·OFF</button>
    </div>

    <div class="footer">© 198X&nbsp;&nbsp;·&nbsp;&nbsp;ALL CIRCUITS RESERVED</div>
  </main>

<script>
(() => {
  'use strict';

  // ─────────── CONSTANTS ───────────
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const GRID = 20;        // 20x20 cells
  const TILE = 16;        // 16 logical pixels per cell → 320x320 logical
  const W = GRID * TILE;
  const H = GRID * TILE;

  // Palette (NES-flavored)
  const P = {
    bgA:    '#0a0420',
    bgB:    '#13083a',
    grid:   '#1a0e44',
    snakeOutline:  '#0d2a14',
    snakeShadow:   '#2a6f1a',
    snakeMid:      '#67c93a',
    snakeLight:    '#c8ec5a',
    snakeFlash:    '#ffffff',
    eyeDark:       '#000000',
    eyeLight:      '#ffffff',

    cherryOutline: '#3a0a14',
    cherryDark:    '#a01a1a',
    cherryMid:     '#e83a3a',
    cherryShine:   '#ffaaa0',

    enemyOutline:  '#2a061a',
    enemyShadow:   '#7a1a3a',
    enemyMid:      '#d83078',
    enemyLight:    '#ff7ac0',
    enemyEye:      '#ffd23a',
    cherryStem:    '#6a4a1a',
    cherryStemHi:  '#a07835',
    leafDark:      '#2a7a1a',
    leafMid:       '#4ec934',
    leafHi:        '#92ec3a',

    txtCyan:       '#3afaff',
    txtYellow:     '#ffd23a',
    txtCream:      '#fffce0',
  };

  // ─────────── STATE ───────────
  let snake, dir, nextDir, food, score, best, level, alive, paused, started;
  let enemy, enemyDir, enemyTickAccum, enemyTickInterval;
  let tickAccum = 0;
  let tickInterval = 1 / 7.5;     // seconds per step
  let baseTickInterval = tickInterval;
  let pulseT = 0;
  let deathFlash = 0;
  let flashWhite = 0;             // brief white flash on eat
  let particles = [];

  best = parseInt(localStorage.getItem('serpentine-8bit-best') || '0', 10) || 0;

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 2, y: mid },
      { x: mid - 1, y: mid },
      { x: mid,     y: mid }
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    tickInterval = baseTickInterval;
    tickAccum = 0;
    alive = true;
    paused = false;
    started = false;
    deathFlash = 0;
    flashWhite = 0;
    particles = [];
    spawnEnemy();
    spawnFood();
    updateUI();
    showOverlay(
      'A R C A D E',
      'SERPENTINE',
      'EAT THE CHERRIES.<br/>DODGE YOUR TAIL.<br/>FLEE THE PINK SERPENT.',
      '► PRESS ANY ARROW'
    );
  }

  function spawnEnemy() {
    // length 5, body fully on-grid, placed in the row opposite the player
    const playerHead = snake[snake.length - 1];
    const ey = playerHead.y > GRID / 2 ? 2 : GRID - 3;
    enemy = [];
    if (playerHead.x > GRID / 2) {
      // player on right half → enemy enters from the left, moving right
      enemyDir = { x: 1, y: 0 };
      for (let i = 4; i >= 0; i--) enemy.push({ x: 4 - i, y: ey });
    } else {
      // player on left half → enemy enters from the right, moving left
      enemyDir = { x: -1, y: 0 };
      for (let i = 4; i >= 0; i--) enemy.push({ x: GRID - 5 + i, y: ey });
    }
    enemyTickAccum = 0;
    enemyTickInterval = baseTickInterval * 1.35;
  }

  function spawnFood() {
    const occ = new Set([...snake, ...(enemy || [])].map(s => s.x + ',' + s.y));
    const free = [];
    for (let x = 0; x < GRID; x++)
      for (let y = 0; y < GRID; y++)
        if (!occ.has(x + ',' + y)) free.push({ x, y });
    food = free[Math.floor(Math.random() * free.length)] || { x: 0, y: 0 };
  }

  function updateUI(bumpScore) {
    const s = document.getElementById('score');
    const b = document.getElementById('best');
    const l = document.getElementById('level');
    s.textContent = String(score).padStart(4, '0');
    b.textContent = String(best).padStart(4, '0');
    l.textContent = String(level).padStart(2, '0');
    if (bumpScore) {
      s.classList.remove('bump');
      void s.offsetWidth;
      s.classList.add('bump');
      setTimeout(() => s.classList.remove('bump'), 140);
    }
  }

  function showOverlay(eyebrow, title, html, hint) {
    document.getElementById('overlayEyebrow').textContent = eyebrow;
    document.getElementById('overlayTitle').textContent   = title;
    document.getElementById('overlayText').innerHTML      = html;
    document.getElementById('overlayHint').textContent    = hint;
    document.getElementById('overlay').classList.add('visible');
  }
  function hideOverlay() {
    document.getElementById('overlay').classList.remove('visible');
  }

  // ─────────── GAME STEP ───────────
  function step() {
    dir = nextDir;
    const head = snake[snake.length - 1];
    const nh = { x: head.x + dir.x, y: head.y + dir.y };

    if (nh.x < 0 || nh.x >= GRID || nh.y < 0 || nh.y >= GRID) return die();
    const willEat = (nh.x === food.x && nh.y === food.y);
    const collideStart = willEat ? 0 : 1;
    for (let i = collideStart; i < snake.length; i++) {
      if (snake[i].x === nh.x && snake[i].y === nh.y) return die();
    }
    // collide with enemy snake
    for (let i = 0; i < enemy.length; i++) {
      if (enemy[i].x === nh.x && enemy[i].y === nh.y) return die();
    }

    snake.push(nh);
    if (willEat) {
      score += 10;
      // particle burst
      const cx = food.x * TILE + TILE / 2;
      const cy = food.y * TILE + TILE / 2;
      for (let i = 0; i < 10; i++) {
        const a = (Math.PI * 2 * i) / 10 + Math.random() * 0.4;
        const sp = 30 + Math.random() * 30;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 0.5 + Math.random() * 0.25,
          age: 0,
          color: i % 3 === 0 ? P.txtYellow : (i % 3 === 1 ? P.cherryMid : P.cherryShine)
        });
      }
      // level up every 5 cherries
      const cherries = Math.floor(score / 10);
      const newLevel = 1 + Math.floor(cherries / 5);
      if (newLevel !== level) level = newLevel;
      tickInterval = Math.max(1 / 16, baseTickInterval - (level - 1) * 0.012);
      flashWhite = 0.8;
      playEat();
      spawnFood();
      updateUI(true);
    } else {
      snake.shift();
    }
  }

  function stepEnemy() {
    const head = enemy[enemy.length - 1];
    const target = snake[snake.length - 1];
    const candidates = [
      { x:  1, y:  0 },
      { x: -1, y:  0 },
      { x:  0, y:  1 },
      { x:  0, y: -1 },
    ];
    // build occupancy: own body except tail (which moves), plus player body
    const playerOcc = new Set(snake.map(s => s.x + ',' + s.y));
    const enemyOcc = new Set();
    for (let i = 1; i < enemy.length; i++) enemyOcc.add(enemy[i].x + ',' + enemy[i].y);

    const scored = candidates
      .filter(d => !(d.x === -enemyDir.x && d.y === -enemyDir.y))
      .map(d => {
        const nx = head.x + d.x;
        const ny = head.y + d.y;
        const key = nx + ',' + ny;
        let cost = 0;
        if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) cost += 1000;
        if (enemyOcc.has(key)) cost += 1000;
        // landing on player kills the player — that's GOOD for the enemy
        const eatsPlayer = playerOcc.has(key);
        const dist = Math.abs(nx - target.x) + Math.abs(ny - target.y);
        return { d, cost, dist, eatsPlayer, nx, ny };
      });

    // prefer killing player; otherwise minimize distance, avoid blocked tiles
    scored.sort((a, b) => {
      if (a.cost !== b.cost) return a.cost - b.cost;
      if (a.eatsPlayer !== b.eatsPlayer) return a.eatsPlayer ? -1 : 1;
      return a.dist - b.dist;
    });

    const choice = scored[0];
    if (!choice || choice.cost >= 1000) {
      // trapped — respawn elsewhere
      spawnEnemy();
      return;
    }

    enemyDir = choice.d;
    const nh = { x: choice.nx, y: choice.ny };
    enemy.push(nh);
    enemy.shift();

    // if enemy head landed on the player, player dies
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === nh.x && snake[i].y === nh.y) { die(); return; }
    }
    // enemy can also gobble the cherry — denies it from the player
    if (nh.x === food.x && nh.y === food.y) {
      enemy.unshift({ x: enemy[0].x, y: enemy[0].y }); // grow by 1
      spawnFood();
    }
  }

  function die() {
    alive = false;
    deathFlash = 1;
    playDie();
    if (score > best) {
      best = score;
      localStorage.setItem('serpentine-8bit-best', String(best));
      updateUI();
    }
    const text = score > 0
      ? `SCORE&nbsp;&nbsp;${String(score).padStart(4,'0')}<br/>LEVEL&nbsp;&nbsp;${String(level).padStart(2,'0')}`
      : 'NICE TRY, PLAYER 1';
    showOverlay('GAME OVER', 'GAME OVER', text, '► PRESS R TO CONTINUE');
  }

  // ─────────── DRAW ───────────
  function draw(dt) {
    pulseT += dt;
    if (deathFlash > 0) deathFlash = Math.max(0, deathFlash - dt * 1.6);
    if (flashWhite > 0) flashWhite = Math.max(0, flashWhite - dt * 4.5);

    // Phosphor floor color
    ctx.fillStyle = P.bgA;
    ctx.fillRect(0, 0, W, H);

    // Soft starfield-ish gradient
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
    g.addColorStop(0, '#1a0e4a');
    g.addColorStop(1, '#06021a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Faint dotted grid (every cell, single pixel dot at intersection)
    ctx.fillStyle = P.grid;
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        ctx.fillRect(x * TILE, y * TILE, 1, 1);
      }
    }

    // outer 1px border
    ctx.fillStyle = '#2a1968';
    ctx.fillRect(0, 0, W, 1);
    ctx.fillRect(0, H-1, W, 1);
    ctx.fillRect(0, 0, 1, H);
    ctx.fillRect(W-1, 0, 1, H);

    // food
    drawCherry(food.x * TILE, food.y * TILE, pulseT);

    // enemy snake (drawn under player so player feels in front)
    for (let i = 0; i < enemy.length; i++) {
      const seg = enemy[i];
      const isHead = i === enemy.length - 1;
      const isTail = i === 0;
      drawSegment(seg.x * TILE, seg.y * TILE, isHead, isTail, enemyDir, 0, true);
    }

    // snake
    for (let i = 0; i < snake.length; i++) {
      const seg = snake[i];
      const isHead = i === snake.length - 1;
      const isTail = i === 0;
      drawSegment(seg.x * TILE, seg.y * TILE, isHead, isTail, dir, flashWhite, false);
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      if (p.age >= p.life) { particles.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 60 * dt;
      const px = Math.floor(p.x);
      const py = Math.floor(p.y);
      if (px >= 0 && px < W && py >= 0 && py < H) {
        ctx.fillStyle = p.color;
        ctx.fillRect(px, py, 2, 2);
      }
    }

    // death red wash
    if (deathFlash > 0) {
      ctx.fillStyle = `rgba(232, 58, 58, ${deathFlash * 0.55})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ─────────── SPRITES ───────────
  function drawSegment(ox, oy, isHead, isTail, d, flash, isEnemy) {
    // base palette swap on flash; enemy uses red/pink palette
    const outline = isEnemy ? P.enemyOutline : P.snakeOutline;
    const shadow  = isEnemy ? P.enemyShadow  : P.snakeShadow;
    const mid     = isEnemy ? P.enemyMid     : (flash > 0.3 ? P.snakeFlash : P.snakeMid);
    const light   = isEnemy ? P.enemyLight   : (flash > 0.3 ? '#ffffff'    : P.snakeLight);
    const eyeOuter = isEnemy ? P.eyeDark : P.eyeDark;
    const eyeInner = isEnemy ? P.enemyEye : P.eyeLight;

    // 16x16 rounded body — cells x1..14 wide vertically, y1..14 horizontally
    // outline
    ctx.fillStyle = outline;
    ctx.fillRect(ox + 2, oy + 1, 12, 1);   // top
    ctx.fillRect(ox + 2, oy + 14, 12, 1);  // bottom
    ctx.fillRect(ox + 1, oy + 2, 1, 12);   // left
    ctx.fillRect(ox + 14, oy + 2, 1, 12);  // right
    // corner pixels
    ctx.fillRect(ox + 2, oy + 2, 1, 1);
    ctx.fillRect(ox + 13, oy + 2, 1, 1);
    ctx.fillRect(ox + 2, oy + 13, 1, 1);
    ctx.fillRect(ox + 13, oy + 13, 1, 1);

    // mid fill (interior 12x12)
    ctx.fillStyle = mid;
    ctx.fillRect(ox + 3, oy + 2, 10, 12);
    ctx.fillRect(ox + 2, oy + 3, 12, 10);

    // shadow band bottom + right
    ctx.fillStyle = shadow;
    ctx.fillRect(ox + 12, oy + 4, 1, 9);
    ctx.fillRect(ox + 4, oy + 12, 9, 1);
    ctx.fillRect(ox + 11, oy + 11, 1, 1);

    // top-left highlight
    ctx.fillStyle = light;
    ctx.fillRect(ox + 3, oy + 3, 8, 1);
    ctx.fillRect(ox + 3, oy + 4, 1, 7);

    // diamond scale detail (only on body, not head)
    if (!isHead) {
      ctx.fillStyle = shadow;
      ctx.fillRect(ox + 8, oy + 6, 1, 1);
      ctx.fillRect(ox + 7, oy + 7, 3, 1);
      ctx.fillRect(ox + 6, oy + 8, 5, 1);
      ctx.fillRect(ox + 7, oy + 9, 3, 1);
      ctx.fillRect(ox + 8, oy + 10, 1, 1);
      ctx.fillStyle = light;
      ctx.fillRect(ox + 8, oy + 8, 1, 1);
    }

    if (isHead) {
      // eyes by direction
      let eyes;
      if (d.x === 1)       eyes = [[10, 5], [10, 10]];
      else if (d.x === -1) eyes = [[4, 5],  [4, 10]];
      else if (d.y === -1) eyes = [[5, 4],  [10, 4]];
      else                 eyes = [[5, 10], [10, 10]];

      for (const [ex, ey] of eyes) {
        ctx.fillStyle = eyeOuter;
        ctx.fillRect(ox + ex, oy + ey, 2, 2);
        ctx.fillStyle = eyeInner;
        ctx.fillRect(ox + ex, oy + ey, 1, 1);
      }

      // tongue blink (only when moving horizontally)
      if (Math.floor(pulseT * 2) % 4 === 0) {
        ctx.fillStyle = P.cherryMid;
        if (d.x === 1)       ctx.fillRect(ox + 14, oy + 7, 2, 2);
        else if (d.x === -1) ctx.fillRect(ox,      oy + 7, 2, 2);
        else if (d.y === -1) ctx.fillRect(ox + 7,  oy,     2, 2);
        else                 ctx.fillRect(ox + 7,  oy + 14, 2, 2);
      }
    }

    if (isTail) {
      // small notch at the tail end (decorative)
      ctx.fillStyle = shadow;
      ctx.fillRect(ox + 7, oy + 13, 2, 1);
    }
  }

  function drawCherry(ox, oy, t) {
    // bob
    const bob = Math.floor(Math.sin(t * 4) * 1);
    oy += bob;

    // glow halo (subtle, just a few pixels around)
    const glow = (Math.sin(t * 6) * 0.5 + 0.5) * 0.6 + 0.4;
    ctx.fillStyle = `rgba(255, 90, 90, ${0.18 * glow})`;
    ctx.fillRect(ox - 2, oy + 4, 20, 12);
    ctx.fillRect(ox + 2, oy, 12, 20);

    // ── stem ──
    ctx.fillStyle = P.cherryStem;
    ctx.fillRect(ox + 8, oy + 1, 1, 5);
    ctx.fillRect(ox + 9, oy + 1, 1, 4);
    ctx.fillStyle = P.cherryStemHi;
    ctx.fillRect(ox + 9, oy + 2, 1, 1);

    // ── leaf ──
    ctx.fillStyle = P.leafDark;
    ctx.fillRect(ox + 9, oy + 1, 5, 1);
    ctx.fillRect(ox + 10, oy + 4, 4, 1);
    ctx.fillRect(ox + 13, oy + 2, 1, 2);
    ctx.fillStyle = P.leafMid;
    ctx.fillRect(ox + 10, oy + 2, 3, 2);
    ctx.fillStyle = P.leafHi;
    ctx.fillRect(ox + 10, oy + 2, 1, 1);
    ctx.fillRect(ox + 11, oy + 3, 1, 1);

    // ── cherry body 1 (left/big) ──
    drawCherryBall(ox + 2, oy + 6);
    // ── cherry body 2 (right/smaller) ──
    drawCherryBall(ox + 8, oy + 8);
  }

  function drawCherryBall(ox, oy) {
    // 7x7 ball
    // outline
    ctx.fillStyle = P.cherryOutline;
    ctx.fillRect(ox + 1, oy, 5, 1);
    ctx.fillRect(ox + 1, oy + 6, 5, 1);
    ctx.fillRect(ox, oy + 1, 1, 5);
    ctx.fillRect(ox + 6, oy + 1, 1, 5);
    ctx.fillRect(ox + 1, oy + 1, 1, 1);
    ctx.fillRect(ox + 5, oy + 1, 1, 1);
    ctx.fillRect(ox + 1, oy + 5, 1, 1);
    ctx.fillRect(ox + 5, oy + 5, 1, 1);

    // mid fill
    ctx.fillStyle = P.cherryMid;
    ctx.fillRect(ox + 2, oy + 1, 3, 5);
    ctx.fillRect(ox + 1, oy + 2, 5, 3);

    // shadow
    ctx.fillStyle = P.cherryDark;
    ctx.fillRect(ox + 5, oy + 3, 1, 2);
    ctx.fillRect(ox + 3, oy + 5, 2, 1);

    // shine
    ctx.fillStyle = P.cherryShine;
    ctx.fillRect(ox + 2, oy + 2, 1, 1);
    ctx.fillRect(ox + 3, oy + 2, 1, 1);
    ctx.fillRect(ox + 2, oy + 3, 1, 1);
  }

  // ─────────── LOOP ───────────
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.1, (now - last) / 1000);
    last = now;

    if (alive && started && !paused) {
      tickAccum += dt;
      while (tickAccum >= tickInterval) {
        tickAccum -= tickInterval;
        step();
        if (!alive) break;
      }
      // enemy ticks on its own slower clock; speeds up with level
      const eInterval = Math.max(1 / 13, baseTickInterval * 1.35 - (level - 1) * 0.014);
      enemyTickAccum += dt;
      while (alive && enemyTickAccum >= eInterval) {
        enemyTickAccum -= eInterval;
        stepEnemy();
        if (!alive) break;
      }
    }

    draw(dt);
    requestAnimationFrame(loop);
  }

  // ─────────── AUDIO (chiptune SFX) ───────────
  let audioCtx = null;
  let soundOn = false;
  const soundBtn = document.getElementById('soundToggle');

  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    return audioCtx;
  }

  function tone(freq, dur, type = 'square', vol = 0.12, slideTo = null, delay = 0) {
    if (!soundOn) return;
    const ac = ensureAudio();
    if (!ac) return;
    const t0 = ac.currentTime + delay;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo != null) osc.frequency.linearRampToValueAtTime(slideTo, t0 + dur);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0005, t0 + dur);
    osc.connect(gain).connect(ac.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function playEat() {
    tone(880, 0.05, 'square', 0.10);
    tone(1320, 0.08, 'square', 0.10, null, 0.05);
  }
  function playDie() {
    tone(440, 0.12, 'square', 0.14, 220, 0);
    tone(220, 0.12, 'square', 0.14, 110, 0.10);
    tone(110, 0.20, 'square', 0.14, 60,  0.20);
  }
  function playMove() {
    tone(180, 0.02, 'square', 0.04);
  }

  function setSound(on) {
    soundOn = on;
    soundBtn.textContent = on ? '♪ SND·ON ' : '♪ SND·OFF';
    soundBtn.classList.toggle('off', !on);
    soundBtn.setAttribute('aria-pressed', String(on));
    if (on) ensureAudio();
  }

  soundBtn.addEventListener('click', () => setSound(!soundOn));

  // ─────────── INPUT ───────────
  const dirMap = {
    ArrowUp:    { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x:  1, y: 0 },
    w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
    a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
  };

  function applyDir(nd) {
    if (nd.x === -dir.x && nd.y === -dir.y) return false;
    if (nd.x === nextDir.x && nd.y === nextDir.y) return false;
    nextDir = nd;
    playMove();
    return true;
  }

  document.addEventListener('keydown', (e) => {
    const key = e.key;

    if (key === 'r' || key === 'R') {
      e.preventDefault();
      reset();
      return;
    }

    if (key === 'm' || key === 'M') {
      e.preventDefault();
      setSound(!soundOn);
      return;
    }

    if (!alive) return;

    if (key === ' ' || key === 'Spacebar') {
      e.preventDefault();
      if (!started) {
        started = true;
        hideOverlay();
      } else {
        paused = !paused;
        if (paused) {
          showOverlay('PAUSED', 'PAUSED', '— TAKE A BREATHER —', '► PRESS SPACE');
        } else {
          hideOverlay();
        }
      }
      return;
    }

    const lookup = key.length === 1 ? key.toLowerCase() : key;
    const nd = dirMap[lookup];
    if (nd) {
      e.preventDefault();
      if (applyDir(nd)) {
        if (!started) { started = true; hideOverlay(); }
        if (paused)   { paused  = false; hideOverlay(); }
      }
    }
  });

  // touch / swipe
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 16 && Math.abs(dy) < 16) { touchStart = null; return; }
    let nd;
    if (Math.abs(dx) > Math.abs(dy)) nd = dx > 0 ? dirMap.ArrowRight : dirMap.ArrowLeft;
    else                              nd = dy > 0 ? dirMap.ArrowDown  : dirMap.ArrowUp;
    if (alive) {
      if (applyDir(nd)) {
        if (!started) { started = true; hideOverlay(); }
        if (paused)   { paused  = false; hideOverlay(); }
      }
    }
    touchStart = null;
  }, { passive: true });

  // first user gesture enables audio engine (button is independent toggle)
  document.addEventListener('keydown', () => { ensureAudio(); }, { once: true });

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
